name: CI

on:
  push:
    branches: [main, modular-monolith]
  pull_request:
    branches: [main, modular-monolith]

jobs:
  test:
    name: Build & test (monolith)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: healthcare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Testcontainers needs Docker; ubuntu-latest ships with it preinstalled and running.
      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode --no-transfer-progress test
