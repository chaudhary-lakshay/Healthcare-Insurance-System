# Test profile. Datasource is supplied by Testcontainers via @ServiceConnection
# (see IntegrationTestBase), so no datasource block here.
spring:
  jpa:
    hibernate:
      # Keep prod behaviour: entities must match the Flyway-built schema or startup fails.
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  batch:
    job:
      enabled: false
    jdbc:
      # Fresh Testcontainers MySQL has no BATCH_* metadata tables and the prod
      # setting is `never`; create them for the test DB so the job can launch.
      initialize-schema: always

# Benefit batch CSV lands at a known path the tests can read and assert on.
benefit:
  issuance:
    output-file: target/benefit_output_test.csv

logging:
  level:
    root: WARN
    com.lakshay.healthcare: INFO
    org.testcontainers: INFO

jwt:
  # Test-only secret so the suite doesn't need JWT_SECRET set. Not for prod —
  # prod has no default and must supply its own.
  secret: test-only-jwt-secret-not-for-production-use-min-256-bits-0123456789
