spring:
  application:
    name: ISH-ModularMonolith
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 604800000
  header: Authorization
  prefix: Bearer
  issuer: ish-health-system
  audience: ish-services

app:
  cors:
    # Allowed origins, comma-separated. "*" = all (dev only) — lock down in prod
    # via APP_CORS_ALLOWED_ORIGINS=https://app.example.com,https://admin.example.com
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}

logging:
  level:
    root: INFO
    com.lakshay.healthcare: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
